include conf.d/common/drop.conf;

error_page 404 /404.html;
#error_page 403 /403.html;


location @app {
    include conf.d/header.conf;
    if ($request_filename ~ .*\.(ico|gif|jpe?g|png|css|js)$) { access_log off; }
    proxy_pass http://unicorn;
    proxy_set_header X-Accel-Mapping /shirasagi/=/private_files/;
    proxy_intercept_errors on;
}
location / {
    include conf.d/common/security.conf;
    try_files $uri $uri/index.html @app;
}
location /assets/ {
    root /shirasagi/public/;
    expires 1h;
    access_log off;
}
location /private_files/ {
    internal;
    alias /shirasagi/;
}
